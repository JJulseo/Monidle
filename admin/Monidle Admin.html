<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Monidle Admin</title>
  <link rel="stylesheet" href="styles.css"/>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    html, body { width: 100%; height: 100%; background: #000; }
    #stage {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #000;
      overflow: hidden;
    }
    #window-wrap {
      width: 1440px; height: 900px;
      transform-origin: center center;
      flex-shrink: 0;
    }
    .mac-shell {
      width: 100%; height: 100%;
      border-radius: 14px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 0 0 2px #000;
      display: flex; flex-direction: column;
    }
    .mac-titlebar {
      height: 30px; background: linear-gradient(180deg, #F2F3F5 0%, #E5E7EB 100%);
      border-bottom: 1px solid #D2D6DB;
      display: flex; align-items: center; padding: 0 12px; gap: 8px;
      flex-shrink: 0; user-select: none;
    }
    .mac-lights { display: flex; gap: 8px; align-items: center; }
    .mac-lights .dot { width: 12px; height: 12px; border-radius: 50%; border: 0.5px solid rgba(0,0,0,0.12); }
    .mac-title {
      flex: 1; text-align: center; font-size: 12px; font-weight: 600;
      color: #4B5563; letter-spacing: -0.01em;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro", "Helvetica Neue", sans-serif;
    }
    .mac-body { flex: 1; min-height: 0; display: flex; }
  </style>
</head>
<body>
  <div id="stage">
    <div id="window-wrap">
      <div class="mac-shell">
        <div class="mac-titlebar">
          <div class="mac-lights">
            <span class="dot" style="background: #FF5F57;"></span>
            <span class="dot" style="background: #FEBC2E;"></span>
            <span class="dot" style="background: #28C840;"></span>
          </div>
          <div class="mac-title">Monidle Admin — 환자 모니터링</div>
          <div style="width: 52px;"></div>
        </div>
        <div class="mac-body" id="root"></div>
      </div>
    </div>
  </div>

  <script>
    // Scale window-wrap to fit viewport
    function scaleWrap() {
      const wrap = document.getElementById('window-wrap');
      const padding = 32;
      const sx = (window.innerWidth - padding) / 1440;
      const sy = (window.innerHeight - padding) / 900;
      const s = Math.min(sx, sy, 1);
      wrap.style.transform = `scale(${s})`;
    }
    window.addEventListener('resize', scaleWrap);
    scaleWrap();
  </script>

  <script src="data.js"></script>
  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="topnav.jsx"></script>
  <script type="text/babel" src="patient-sidebar.jsx"></script>
  <script type="text/babel" src="screen-list.jsx"></script>
  <script type="text/babel" src="screen-home.jsx"></script>
  <script type="text/babel" src="screen-vitals.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
